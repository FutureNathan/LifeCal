<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#151515" />

    <title>Life Cal — See your life in weeks</title>
    <meta
      name="description"
      content="Life Cal is a simple visual calendar of your life. Enter your date of birth and see every week, month, and year you've lived — and the ones still ahead."
    />
    <link rel="canonical" href="https://lifecal.nathantowianski.com/" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Life Cal" />
    <meta property="og:title" content="Life Cal — See your life in weeks" />
    <meta
      property="og:description"
      content="A simple visual calendar of your life. See every week, month, and year you've lived — and the ones still ahead."
    />
    <meta property="og:url" content="https://lifecal.nathantowianski.com/" />
    <meta
      property="og:image"
      content="https://lifecal.nathantowianski.com/og-image.png?v=2"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Life Cal — a grid showing a life in months"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Life Cal — See your life in weeks" />
    <meta
      name="twitter:description"
      content="A simple visual calendar of your life. See every week, month, and year you've lived — and the ones still ahead."
    />
    <meta
      name="twitter:image"
      content="https://lifecal.nathantowianski.com/og-image.png?v=2"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
